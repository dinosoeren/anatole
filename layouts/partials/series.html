{{ $related := where .Site.Pages ".Params.series" "intersect" .Params.series }}


<h2>{{ i18n "series_posts" (dict "Title" (replace (index .Params.series 0) "-" " " | title)) }}</h2>
<ul>
  {{ range $related }}
    <li><a href="{{ .Page.RelPermalink }}">{{ title .Page.Title }}</a></li>
  {{ end }}
</ul>
